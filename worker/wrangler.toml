name = "wm-ticker"
main = "worker.js"
compatibility_date = "2026-06-01"

# Produktions-Default: echte Daten. Ohne hinterlegte Secrets fällt der Worker
# automatisch & sicher auf Demo-Daten zurück (kein Absturz).
[vars]
DEMO_MODE = "false"

# Secrets NICHT hier eintragen – per CLI setzen:
#   npx wrangler secret put FOOTBALL_DATA_KEY
#   npx wrangler secret put API_FOOTBALL_KEY
