<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f0d" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WM Lauf-Challenge" />
  <title>WM 2026 · Lauf-Challenge</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <!-- iOS Homescreen-Icon (Safari nutzt NICHT das Manifest, sondern apple-touch-icon, PNG zwingend) -->
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />

  <!-- Tailwind (CDN-Prototyp – für Produktion via PostCSS/CLI bundeln) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // WM-2026-Akzente + „Stadion"-Energie (Fusion aus den Inspo-Designs)
            wm: {
              gold:    '#E4B458',
              green:   '#34C759', // Erfolg/positiv
              red:     '#FF3B30', // Live/Warnung
              blue:    '#0A84FF', // System-Blau
              lime:    '#B8F23C', // Acid-Lime CTA (Bild 1)
              emerald: '#10B981', // Smaragd (Bild 2)
              plum:    '#7C3AED', // Lila-Akzent Light-Mode (Bild 3)
            },
            // Flächen: hell (soft premium) + dunkel (edles Charcoal)
            ink: {
              50:  '#f4f5f7', // Body hell (soft off-white)
              100: '#eceef1', // Karten-Sekundärflächen hell
              800: '#1c2128', // erhöhte Flächen Dark
              900: '#171b21', // Karten im Dark-Mode (edles Charcoal)
              950: '#0e1115', // Body im Dark-Mode
            }
          },
          fontFamily: {
            sans: ['-apple-system','BlinkMacSystemFont','SF Pro Display','Segoe UI','Roboto','Helvetica','Arial','sans-serif'],
          },
          boxShadow: {
            card: '0 1px 2px rgba(16,24,40,0.03), 0 12px 32px -8px rgba(16,24,40,0.10)',
            'card-dark': '0 1px 2px rgba(0,0,0,0.5), 0 16px 40px -12px rgba(0,0,0,0.6)',
            glow: '0 8px 28px -6px rgba(16,185,129,0.45)',
          },
          borderRadius: { xl2: '1.5rem', xl3: '1.875rem' }
        }
      }
    }
  </script>

  <style>
    /* Sanfte System-Typografie & Anti-Aliasing wie auf Apple-Plattformen */
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body { -webkit-tap-highlight-color: transparent; }

    /* Safe-Area-Insets (iPhone-Notch / Home-Indicator) */
    .pt-safe { padding-top: max(env(safe-area-inset-top), 0.75rem); }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 4.75rem); }
    .nav-safe { padding-bottom: max(env(safe-area-inset-bottom), 0.5rem); }

    /* Apple-Watch-Fortschrittsring */
    .ring-track  { stroke: rgba(120,120,128,0.18); }
    .ring-value  { transition: stroke-dashoffset 700ms cubic-bezier(.22,1,.36,1); stroke-linecap: round; }

    /* Live-Puls */
    @keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .35; transform: scale(.85); } }
    .live-dot { animation: pulse-dot 1.4s ease-in-out infinite; }

    /* Sanftes Einblenden bei Tab-Wechsel */
    @keyframes fade-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .fade-up { animation: fade-up .32s cubic-bezier(.22,1,.36,1); }

    /* Apple-Style Toggle */
    .switch { width: 51px; height: 31px; border-radius: 9999px; transition: background-color .25s ease; }
    .switch-knob { width: 27px; height: 27px; transition: transform .25s cubic-bezier(.22,1,.36,1); box-shadow: 0 2px 4px rgba(0,0,0,.2); }
    .switch[data-on="true"] .switch-knob { transform: translateX(20px); }

    /* Scrollbar dezent ausblenden (mobil-Look) */
    ::-webkit-scrollbar { width: 0; height: 0; }

    /* ---- Feier & Animation ---- */
    .confetti-canvas { position: fixed; inset: 0; z-index: 70; pointer-events: none; }

    @keyframes toast-rise {
      0%   { opacity: 0; transform: translate(-50%, 10px) scale(.9); }
      18%  { opacity: 1; transform: translate(-50%, 0) scale(1); }
      80%  { opacity: 1; transform: translate(-50%, -36px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -64px) scale(.96); }
    }
    .celebrate-toast {
      position: fixed; left: 50%; bottom: 38%; z-index: 71; pointer-events: none;
      font-weight: 800; font-size: 26px; color: #34C759;
      text-shadow: 0 2px 12px rgba(0,0,0,.25);
      animation: toast-rise 1.5s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes overlay-pop {
      0%   { opacity: 0; transform: scale(.8); }
      14%  { opacity: 1; transform: scale(1.04); }
      24%  { transform: scale(1); }
      82%  { opacity: 1; }
      100% { opacity: 0; transform: scale(.97); }
    }
    .milestone-overlay { position: fixed; inset: 0; z-index: 72; display: grid; place-items: center; pointer-events: none; }
    .milestone-card {
      text-align: center; padding: 1.5rem 2rem; border-radius: 1.5rem;
      background: rgba(255,255,255,.85); backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: overlay-pop 1.8s cubic-bezier(.22,1,.36,1) forwards;
    }
    html.dark .milestone-card { background: rgba(28,28,30,.85); }

    @keyframes flame-flicker { 0%,100% { transform: scale(1) rotate(-3deg); } 50% { transform: scale(1.18) rotate(3deg); } }
    .flame { display: inline-block; animation: flame-flicker 1s ease-in-out infinite; }

    @media (prefers-reduced-motion: reduce) {
      .celebrate-toast, .milestone-card, .flame, .ring-value, .fade-up { animation: none !important; transition: none !important; }
    }

    /* ---- Team-Wappen (runde Flaggen-Badges) ---- */
    .crest { border-radius: 9999px; object-fit: cover; background: rgba(120,120,128,.15); display: inline-block; vertical-align: middle; flex-shrink: 0; }
    .crest-sm { width: 22px; height: 22px; }
    .crest-md { width: 30px; height: 30px; }
    .crest-lg { width: 46px; height: 46px; }
    .crest-ring { box-shadow: 0 0 0 2px rgba(255,255,255,.12), 0 2px 6px rgba(0,0,0,.25); }

    /* ---- Segmented Sub-Tabs (in-Screen-Navigation) ---- */
    .seg { display:flex; gap:4px; padding:4px; border-radius:14px; background:rgba(120,120,128,.12); }
    html.dark .seg { background:rgba(120,120,128,.20); }
    .seg-btn { flex:1; padding:8px 0; border-radius:10px; font-size:13px; font-weight:600; color:rgba(60,60,67,.55); transition:background-color .2s, color .2s, box-shadow .2s; }
    html.dark .seg-btn { color:rgba(235,235,245,.5); }
    .seg-btn.seg-active { background:#fff; color:#0e1115; box-shadow:0 1px 3px rgba(0,0,0,.12); }
    html.dark .seg-btn.seg-active { background:#2a2f37; color:#fff; }

    /* ---- Filter-Chips (horizontal scrollbar) ---- */
    .chip { white-space:nowrap; padding:7px 15px; border-radius:999px; font-size:13px; font-weight:600; background:rgba(120,120,128,.12); color:rgba(60,60,67,.7); transition:background-color .2s, color .2s, box-shadow .2s; }
    html.dark .chip { background:rgba(120,120,128,.18); color:rgba(235,235,245,.62); }
    .chip-active { background:linear-gradient(135deg,#10B981,#059669); color:#fff !important; box-shadow:0 4px 12px rgba(16,185,129,.35); }

    /* ---- Floating Bottom-Nav (Pill, aktiver Tab als Kapsel) ---- */
    .nav-btn { color: rgba(60,60,67,.5); }
    html.dark .nav-btn { color: rgba(235,235,245,.5); }
    .nav-btn.nav-active { color: #fff !important; background: linear-gradient(135deg, #10B981, #059669); box-shadow: 0 6px 16px rgba(16,185,129,.4); }
    .nav-btn.nav-active svg { color: #fff; stroke-width: 2; }

    /* ---- Kalender-Streifen (aktiver Tag als Emerald-Kapsel) ---- */
    .cal-active { background: linear-gradient(135deg, #10B981, #059669); box-shadow: 0 6px 16px rgba(16,185,129,.4); border: none; }

    /* ---- Pitch-Verlauf für Hero-/Featured-Karten ---- */
    .pitch-grad { background: radial-gradient(120% 120% at 80% 0%, #1f6b3a 0%, #0e3b22 45%, #0a0f0d 100%); }
    .glass { background: rgba(255,255,255,.08); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.12); }

    /* Score-Typografie */
    .score { font-variant-numeric: tabular-nums; font-weight: 800; letter-spacing: -.02em; }

    /* ====== „Erlebnis"-Schicht: smooothe Mikro-Animationen ====== */

    /* Gestaffeltes Einblenden von Karten (Stagger) */
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    .stagger > * { opacity: 0; animation: rise .5s cubic-bezier(.22,1,.36,1) forwards; }
    .stagger > *:nth-child(1){animation-delay:.02s}  .stagger > *:nth-child(2){animation-delay:.06s}
    .stagger > *:nth-child(3){animation-delay:.10s}  .stagger > *:nth-child(4){animation-delay:.14s}
    .stagger > *:nth-child(5){animation-delay:.18s}  .stagger > *:nth-child(6){animation-delay:.22s}
    .stagger > *:nth-child(7){animation-delay:.26s}  .stagger > *:nth-child(8){animation-delay:.30s}
    .stagger > *:nth-child(9){animation-delay:.34s}  .stagger > *:nth-child(n+10){animation-delay:.38s}

    /* Weicher Tab-Wechsel des Inhalts */
    @keyframes tab-in { from { opacity: 0; transform: translateY(8px) scale(.995); } to { opacity: 1; transform: none; } }
    .tab-enter { animation: tab-in .34s cubic-bezier(.22,1,.36,1); }

    /* Press-Feedback (sanftes Eindrücken) */
    .press { transition: transform .12s cubic-bezier(.22,1,.36,1); }
    .press:active { transform: scale(.97); }

    /* Bottom-Sheet (Spiel-Detail) */
    @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .sheet-backdrop { position: fixed; inset: 0; z-index: 80; background: rgba(0,0,0,.45); backdrop-filter: blur(4px); animation: fade-in .25s ease forwards; }
    .sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 81; animation: sheet-up .42s cubic-bezier(.22,1,.36,1); }
    .sheet-backdrop.closing { animation: fade-in .2s ease reverse forwards; }
    .sheet.closing { animation: sheet-up .28s cubic-bezier(.4,0,1,1) reverse forwards; }
    .grabber { width: 38px; height: 5px; border-radius: 999px; background: rgba(120,120,128,.4); margin: 10px auto 4px; }

    /* Skeleton-Shimmer (statt Spinner) */
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    .skeleton { position: relative; overflow: hidden; background: rgba(120,120,128,.12); }
    .skeleton::after { content:''; position:absolute; inset:0; transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent); animation: shimmer 1.3s infinite; }

    /* Countdown-Ziffern */
    .cd-num { font-variant-numeric: tabular-nums; font-weight: 800; letter-spacing: -.02em; }

    @media (prefers-reduced-motion: reduce) {
      .stagger > *, .tab-enter, .sheet, .sheet-backdrop, .skeleton::after { animation: none !important; opacity: 1 !important; transform: none !important; }
    }

    /* ====== Glassy v3 — modernes Frosted-Design ====== */

    /* Ambient-Hintergrund: sanfte Emerald-Glows hinter allem */
    body { background-attachment: fixed; }
    html:not(.dark) body {
      background-image:
        radial-gradient(55% 42% at 88% -8%, rgba(16,185,129,.12), transparent 60%),
        radial-gradient(48% 38% at -12% 106%, rgba(45,212,191,.10), transparent 60%);
    }
    html.dark body {
      background-image:
        radial-gradient(55% 42% at 88% -8%, rgba(16,185,129,.16), transparent 60%),
        radial-gradient(48% 38% at -12% 106%, rgba(20,184,166,.12), transparent 60%);
    }

    /* Glass-Karten (frosted, leichter oberer Lichtrand) */
    .glass-card {
      position: relative;
      background: rgba(255,255,255,.70);
      backdrop-filter: blur(16px) saturate(1.5);
      -webkit-backdrop-filter: blur(16px) saturate(1.5);
      border: 1px solid rgba(255,255,255,.6);
      box-shadow: 0 1px 2px rgba(16,24,40,.04), 0 14px 36px -10px rgba(16,24,40,.16);
    }
    html.dark .glass-card {
      background: rgba(26,31,38,.62);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 18px 44px -14px rgba(0,0,0,.6);
    }

    /* Glas-Chip (Pills auf dunklen Hero-Flächen) */
    .glass-chip { background: rgba(255,255,255,.14); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.18); }

    /* Hero-Spotlight (Stadionlicht-Glow) */
    .hero-spot::before { content:''; position:absolute; top:-32%; left:50%; transform:translateX(-50%);
      width:78%; height:85%; background: radial-gradient(ellipse at center, rgba(184,242,60,.20), transparent 70%); pointer-events:none; }

    /* Chart: Linie zeichnet sich ein, Fläche blendet auf, Endpunkt poppt */
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .chart-line { stroke-dasharray: 1; stroke-dashoffset: 1; animation: draw 1.1s cubic-bezier(.4,0,.2,1) forwards .15s; }
    @keyframes area-in { from { opacity: 0; } to { opacity: 1; } }
    .chart-area { opacity: 0; animation: area-in .8s ease forwards .55s; }
    @keyframes dot-pop { 0%{transform:scale(0)} 70%{transform:scale(1.35)} 100%{transform:scale(1)} }
    .chart-dot { transform-box: fill-box; transform-origin: center; transform: scale(0); animation: dot-pop .45s cubic-bezier(.22,1,.36,1) forwards 1.05s; }

    /* Fortschrittsbalken füllen sich von links */
    @keyframes grow-x { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    .bar-fill { transform-origin: left; animation: grow-x .9s cubic-bezier(.22,1,.36,1) forwards; }

    @media (prefers-reduced-motion: reduce) {
      .chart-line, .chart-area, .chart-dot, .bar-fill { animation: none !important; opacity: 1 !important; transform: none !important; stroke-dashoffset: 0 !important; }
    }
</style>
</head>

<body class="h-full bg-ink-50 text-ink-900 dark:bg-ink-950 dark:text-ink-50 font-sans selection:bg-wm-blue/20">

  <!-- ================= HEADER ================= -->
  <header class="pt-safe sticky top-0 z-30 backdrop-blur-xl bg-ink-50/80 dark:bg-ink-950/70 border-b border-black/5 dark:border-white/10">
    <div class="max-w-md mx-auto px-5 pb-3 flex items-center justify-between gap-3">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-10 h-10 rounded-full grid place-items-center shrink-0 shadow-glow"
             style="background:linear-gradient(135deg,#10B981,#059669)">
          <svg viewBox="0 0 32 32" class="w-7 h-7" aria-hidden="true">
            <circle cx="16" cy="16" r="13" fill="#fff"/>
            <path d="M16 9 l4.2 3.05 -1.6 4.95 -5.2 0 -1.6-4.95 Z" fill="#0e3b22"/>
            <path d="M16 9 V3.4 M20.2 12.05 l5-1.7 M18.6 16.95 l3.5 4.5 M13.4 16.95 l-3.5 4.5 M11.8 12.05 l-5-1.7"
                  stroke="#0e3b22" stroke-width="1.7" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <div class="min-w-0">
          <p id="header-greet" class="text-[12px] font-medium text-ink-900/50 dark:text-ink-50/50 leading-tight truncate">Willkommen 👋</p>
          <h1 id="header-title" class="text-[20px] font-bold leading-tight truncate">Live-Ticker</h1>
        </div>
      </div>
      <button data-action="open-settings"
              class="grid place-items-center w-10 h-10 rounded-full bg-black/5 dark:bg-white/10 active:scale-90 transition shrink-0"
              aria-label="Einstellungen">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
      </button>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main id="app" class="max-w-md mx-auto px-5 pt-4 pb-safe min-h-full">
    <!-- Inhalt wird per JS gerendert -->
    <div class="py-20 text-center text-ink-900/40 dark:text-ink-50/40">Lade WM-Daten…</div>
  </main>

  <!-- ================= BOTTOM NAV (Floating Pill, 4 Tabs) ================= -->
  <nav class="fixed bottom-0 inset-x-0 z-40 nav-safe pointer-events-none">
    <div class="max-w-md mx-auto px-4 pt-2">
      <div class="pointer-events-auto flex gap-1 p-1.5 rounded-full backdrop-blur-xl bg-white/85 dark:bg-ink-900/85 border border-black/5 dark:border-white/10 shadow-card dark:shadow-card-dark">
        <button data-action="switch-tab" data-tab="today" aria-label="Heute"
                class="nav-btn flex-1 flex flex-col items-center justify-center gap-0.5 py-2 rounded-full press">
          <svg class="w-[22px] h-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg>
          <span class="text-[10px] font-semibold">Heute</span>
        </button>
        <button data-action="switch-tab" data-tab="schedule" aria-label="Spielplan"
                class="nav-btn flex-1 flex flex-col items-center justify-center gap-0.5 py-2 rounded-full press">
          <svg class="w-[22px] h-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>
          <span class="text-[10px] font-semibold">Spielplan</span>
        </button>
        <button data-action="switch-tab" data-tab="table" aria-label="Tabelle"
                class="nav-btn flex-1 flex flex-col items-center justify-center gap-0.5 py-2 rounded-full press">
          <svg class="w-[22px] h-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 20V10M12 20V4M19 20v-7"/></svg>
          <span class="text-[10px] font-semibold">Tabelle</span>
        </button>
        <button data-action="switch-tab" data-tab="challenge" aria-label="Challenge"
                class="nav-btn flex-1 flex flex-col items-center justify-center gap-0.5 py-2 rounded-full press">
          <svg class="w-[22px] h-[22px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="1.6"/><path d="M7 21l3-6 2-3 4 2-2-5"/><path d="M9 9l3.5-2 3 1 2 2"/></svg>
          <span class="text-[10px] font-semibold">Challenge</span>
        </button>
      </div>
    </div>
  </nav>

  <script src="./app.js"></script>
  <script>
    // Service Worker registrieren (PWA / Offline-Fähigkeit)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
